<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradeSync | Login</title>
  <link rel="stylesheet" href="style.css?v=dashboard-tools">
</head>
<body class="auth-page login-page">
  <main class="auth-shell">
    <section class="login-brand-panel">
      <div class="login-brand-wrap">
        <img src="assets/logo.png" alt="GradeSync logo" class="login-hero-logo">
        <p class="login-brand-note">Organize tasks, deadlines, and study plans in one student workspace.</p>
      </div>
    </section>

    <section class="auth-card login-card">
      <div class="card-header">
        <h2>Welcome back</h2>
        <p>Log in to continue to your dashboard.</p>
      </div>

      <div class="input-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="student@example.com" list="savedEmails">
        <datalist id="savedEmails"></datalist>
      </div>

      <div class="input-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>

      <p class="form-message" id="loginMessage" role="status" aria-live="polite"></p>

      <div class="button-group">
        <button type="button" onclick="loginUser()">Login</button>
        <button type="button" class="secondary" onclick="goToSignup()">Create account</button>
      </div>

      <button type="button" class="demo-button" onclick="loginDemoUser()">Use demo account</button>
      <button type="button" class="text-button" onclick="startPasswordReset()">Forgot password?</button>
    </section>
  </main>

  <script src="script.js?v=dashboard-tools"></script>
</body>
</html>
